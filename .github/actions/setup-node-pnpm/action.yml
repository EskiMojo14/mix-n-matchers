name: Setup Node and pnpm

description: Set up pnpm and Node.js, then install dependencies.

inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: "25"

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm ci
